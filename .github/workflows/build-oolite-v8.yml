name: Build MT7621 U-Boot (Oolite V8)

on:
  push:
    branches: [ main ]
    paths:
      - 'configs/**'
      - 'include/configs/**'
      - '.github/workflows/build-oolite-v8.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bison flex libssl-dev xz-utils

      - name: Cache ImmortalWrt SDK toolchain
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/immortalwrt-sdk
          key: immortalwrt-sdk-23.05-ramips-mt7621-toolchain-v5

      - name: Download and extract ImmortalWrt SDK toolchain
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/23.05-SNAPSHOT/targets/ramips/mt7621/immortalwrt-sdk-23.05-SNAPSHOT-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          SDK_DIRNAME="immortalwrt-sdk-23.05-SNAPSHOT-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64"
          echo "Downloading ImmortalWrt SDK..."
          wget --progress=dot:giga "$SDK_URL" -O /tmp/sdk.tar.xz
          echo "Extracting toolchain..."
          # Use tar tf | grep | tar -T - pipeline to avoid path format guessing
          # (avoids issues with ./ prefix or wildcard matching in member names)
          mkdir -p /opt/immortalwrt-sdk
          echo "Sample tar entries (for debug):"
          tar tf /tmp/sdk.tar.xz | grep "toolchain-mipsel_24kc" | head -3
          tar tf /tmp/sdk.tar.xz \
            | grep "toolchain-mipsel_24kc_gcc-12.3.0_musl" \
            | tar xf /tmp/sdk.tar.xz \
                --strip-components=2 \
                -C /opt/immortalwrt-sdk \
                -T -
          rm /tmp/sdk.tar.xz
          echo "Verifying toolchain:"
          ls /opt/immortalwrt-sdk/toolchain-mipsel_24kc_gcc-12.3.0_musl/bin/ | head -5
          /opt/immortalwrt-sdk/toolchain-mipsel_24kc_gcc-12.3.0_musl/bin/mipsel-openwrt-linux-musl-gcc --version

      - name: Build U-Boot for Oolite V8
        run: |
          TOOLCHAIN=/opt/immortalwrt-sdk/toolchain-mipsel_24kc_gcc-12.3.0_musl
          export CROSS_COMPILE=${TOOLCHAIN}/bin/mipsel-openwrt-linux-musl-
          export STAGING_DIR=${TOOLCHAIN}
          export PATH="${TOOLCHAIN}/bin:$PATH"
          make mt7621_build_defconfig
          make -j$(nproc) CROSS_COMPILE=${CROSS_COMPILE} STAGING_DIR=${STAGING_DIR}
          mkdir -p archive
          cp u-boot-mt7621.bin archive/
          cp defconfig archive/mt7621_defconfig

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-mt7621-oolite-v8
          path: archive/
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "U-Boot ${{ github.ref_name }} for Oolite V8"
          body: |
            ## MT7621 U-Boot for GainStrong Oolite V8.0.2

            ### Board Configuration
            - SoC: MT7621A @ 880MHz
            - RAM: 512MB DDR3 @ 1066 MT/s
            - Flash: 32MB NOR SPI
            - Partition: `192k(u-boot),64k(u-boot-env),64k(factory),-(firmware)`
            - Kernel offset: `0x50000`
            - Reset button: GPIO 18 | Status LED: GPIO 0
            - Baud rate: 115200

            ### Files
            - `u-boot-mt7621.bin` — Flash this via TFTP or web recovery UI
            - `mt7621_defconfig` — Build configuration reference

            ### Flashing
            ```
            tftpboot 0x80010000 u-boot-mt7621.bin
            mtd write 0x80010000 u-boot
            ```
          files: |
            archive/u-boot-mt7621.bin
            archive/mt7621_defconfig
          fail_on_unmatched_files: true
