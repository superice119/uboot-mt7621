name: Build MT7621 U-Boot (Oolite V8)

on:
  push:
    branches: [ main ]
    paths:
      - 'configs/**'
      - 'include/configs/**'
      - '.github/workflows/build-oolite-v8.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies and Python 2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bison flex libssl-dev swig
          echo 'Building Python 2.7.18 from source (required by binman)...'
          wget -q https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tar.xz
          tar -xJf Python-2.7.18.tar.xz
          cd Python-2.7.18
          ./configure --quiet && sudo make -j$(nproc) && sudo make install
          sudo ln -sf /usr/local/bin/python2 /usr/bin/python
          python --version

      - name: Download OpenWrt toolchain
        run: |
          wget -q -O - https://github.com/DragonBluep/uboot-mt7621/releases/download/20230517/openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz \
            | tar --xz -xf -
          ls openwrt-toolchain-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64/bin/ | grep 'gcc$' | head -3

      - name: Build U-Boot for Oolite V8
        run: |
          ./customize.sh NOR \
            '192k(u-boot),64k(u-boot-env),64k(factory),-(firmware)' \
            0x50000 \
            18 \
            0 \
            880 \
            1066 \
            DDR3-512MiB \
            115200

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-mt7621-oolite-v8
          path: archive/
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "U-Boot ${{ github.ref_name }} for Oolite V8"
          body: |
            ## MT7621 U-Boot for GainStrong Oolite V8.0.2

            ### Board Configuration
            - SoC: MT7621A @ 880MHz
            - RAM: 512MB DDR3 @ 1066 MT/s
            - Flash: 32MB NOR SPI
            - Partition: `192k(u-boot),64k(u-boot-env),64k(factory),-(firmware)`
            - Kernel offset: `0x50000`
            - Reset button: GPIO 18 | Status LED: GPIO 0
            - Baud rate: 115200

            ### Files
            - `u-boot-mt7621.bin` — Flash via TFTP or web recovery UI
            - `mt7621_defconfig` — Build configuration reference

            ### Flashing
            ```
            tftpboot 0x80010000 u-boot-mt7621.bin
            mtd write 0x80010000 u-boot
            ```
          files: |
            archive/u-boot-mt7621.bin
            archive/mt7621_defconfig
          fail_on_unmatched_files: true
